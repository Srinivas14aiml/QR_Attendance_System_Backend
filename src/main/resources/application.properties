
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/attendance?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
attendance.allowed-cidrs=192.168.0.0/16,127.0.0.1/32,0:0:0:0:0:0:0:1/128

# JWT Settings
app.jwt.secret=${APP_JWT_SECRET:ChangeThisSecretToAStrongRandomKeyOfAtLeast32Chars}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
